name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      # No ANTHROPIC_API_KEY and no network needed: the suite uses the
      # FakeGrader exclusively. This is asserted by the test suite itself.
      - run: npm test
